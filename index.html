<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Funky Frog Labs</title>
  <style>
    :root {
      --text: #202124;
      --muted: #5f6368;
      --border: #dadce0;
      --accent: #813a3a;
      --bg: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(680px, calc(100% - 40px));
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2.25rem;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .apps {
      display: grid;
      gap: 16px;
      margin-top: 32px;
    }

    .app-link {
      display: block;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
    }

    .app-link:hover,
    .app-link:focus {
      border-color: var(--accent);
    }

    .app-link strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1.1rem;
    }

    .app-link span {
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Funky Frog Labs</h1>
    <p>Independent apps and experiments.</p>

    <section class="apps" aria-label="Apps">
      <a class="app-link" href="/privacy-policy/">
        <strong>Uncle Drum</strong>
        <span>Privacy Policy</span>
      </a>
    </section>
  </main>
</body>
</html>
